name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "Ubuntu — Debug (ASan)"
            os: ubuntu-latest
            build_type: Debug
            cc: gcc
            cxx: g++

          - name: "Ubuntu — Release"
            os: ubuntu-latest
            build_type: Release
            cc: gcc
            cxx: g++

          - name: "Windows — Release"
            os: windows-latest
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Install X11 dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Configure CMake
        env:
          CC: ${{ matrix.config.cc }}
          CXX: ${{ matrix.config.cxx }}
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.config.build_type }} --parallel

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: VoxelGame-${{ matrix.config.os }}-${{ matrix.config.build_type }}
          path: |
            build/bin/VoxelGame
            build/bin/VoxelGame.exe
          if-no-files-found: ignore
          retention-days: 7